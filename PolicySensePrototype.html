<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PolicySense — เข้าใจพอร์ตประกันใน 1 ขั้นตอน</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0E2A33; --deep:#12262C; --teal:#0F6E56; --tealDark:#0C5A47;
    --tealSoft:#5DCAA5; --mint:#E1F5EE; --bg:#F6F8F7; --card:#FFFFFF;
    --border:#E2EAE7; --sub:#5F7470; --faint:#9AACA7;
    --amber:#854F0B; --amberBg:#FAEEDA; --amberBorder:#EF9F27;
    --red:#A32D2D; --redBg:#FCEBEB; --redBorder:#E24B4A;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--deep);
    font-family:'IBM Plex Sans Thai','Noto Sans Thai',sans-serif;font-size:15px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input{font-family:inherit}
  .hidden{display:none !important}
  .wrap{max-width:960px;margin:0 auto;padding:0 16px}
  /* top nav */
  header.nav{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border)}
  .nav-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand{font-weight:600;color:var(--ink)}
  .tabs{display:flex;gap:4px}
  .tab{padding:6px 12px;border-radius:8px;font-size:14px;color:var(--sub);background:transparent}
  .tab.active{background:var(--mint);color:var(--teal);font-weight:600}
  .tab:disabled{color:var(--faint);cursor:not-allowed}
  .tab .badge{margin-left:6px;font-size:12px;padding:1px 7px;border-radius:999px;background:var(--amberBg);color:var(--amber)}
  .email{font-size:12px;color:var(--sub)}
  /* buttons */
  .btn-primary{width:100%;padding:12px;border-radius:12px;background:var(--teal);color:#fff;font-weight:500;font-size:15px}
  .btn-primary:hover{background:var(--tealDark)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px}
  .muted{color:var(--sub)}
  .faint{color:var(--faint)}
  h1{font-size:26px;font-weight:600;color:var(--deep);margin:0}
  /* login */
  .login{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--ink)}
  @media(max-width:820px){.login{grid-template-columns:1fr}.login-left{display:none}}
  .login-left{display:flex;flex-direction:column;justify-content:space-between;padding:56px;color:#E9F2EF}
  .login-right{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;border-radius:0}
  @media(min-width:821px){.login-right{border-top-left-radius:40px;border-bottom-left-radius:40px}}
  .pill{font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid #2E4A46;color:#6E8B84;display:inline-block}
  .field{display:block;margin-bottom:16px}
  .field span{display:block;font-size:14px;font-weight:500;color:var(--sub);margin-bottom:6px}
  .field input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:15px}
  .field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,110,86,.15)}
  /* dropzone */
  .drop{margin-top:32px;border:2px dashed var(--border);border-radius:16px;padding:40px;text-align:center;cursor:pointer;background:var(--card)}
  .drop:hover{border-color:var(--teal)}
  .drop.over{border-color:var(--teal);background:var(--mint)}
  .filerow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-top:8px;font-size:14px}
  /* steps */
  .step{display:flex;align-items:center;gap:12px;padding:8px 0}
  .step .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#EEF3F1;color:var(--faint)}
  .step.done .dot{background:var(--teal);color:#fff}
  .step.active .dot{background:var(--mint);color:var(--teal)}
  /* dashboard cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-top:24px}
  .cov{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:left;width:100%;display:flex;flex-direction:column;align-items:center}
  .cov:hover{box-shadow:0 4px 14px rgba(0,0,0,.06)}
  .cov-top{width:100%;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .cov-ico{width:36px;height:36px;border-radius:12px;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:18px}
  .bdg{font-size:12px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .cov-open{width:100%;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.6}
  /* chat */
  .msg{display:flex;margin-bottom:12px}
  .msg.user{justify-content:flex-end}
  .bub{max-width:82%;border-radius:16px;padding:12px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap}
  .bub.user{background:var(--teal);color:#fff}
  .bub.ai{background:var(--card);border:1px solid var(--border)}
  .qbtn{text-align:left;width:100%;font-size:14px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);color:var(--teal);background:var(--card);margin-bottom:8px}
  .qbtn:hover{background:var(--mint)}
  .chip{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);color:var(--sub);background:var(--card)}
  .decide{padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// State (in-memory; หายเมื่อรีเฟรช — เหมือน prototype เดิม)
// ============================================================
const state = {
  screen: "login",       // login | upload | dashboard | chat
  user: null,
  analyzed: false,
  decisions: [],         // {id, decision_type, context, outcome, outcome_detail}
  chat: [],              // {role, content}
  files: [],
  uploadPhase: "idle",   // idle | running | done
  uploadStep: 0,
  chatLoading: false,
};

// ---------- Mock data (persona: ซื้อเอง + พ่อแม่ + บัตร) ----------
const POLICIES = [
  { id:"p1", insurer:"AIA", name:"AIA Health Happy", type:"สุขภาพ", source:"ซื้อเอง", premium:28500,
    items:[["ค่าห้อง/ค่าอาหาร (IPD)","4,000 บ./คืน สูงสุด 90 คืน"],["ค่าผ่าตัดและหัตถการ","150,000 บ./ครั้ง"],["ค่ารักษาผู้ป่วยใน (IPD)","60,000 บ./ครั้ง"]] },
  { id:"p2", insurer:"เมืองไทยประกันภัย", name:"PA Plus", type:"อุบัติเหตุ", source:"พ่อแม่ซื้อให้", premium:6900,
    items:[["ค่ารักษาจากอุบัติเหตุ","30,000 บ./ครั้ง"],["เสียชีวิตจากอุบัติเหตุ","1,000,000 บ."]] },
  { id:"p3", insurer:"ประกันกลุ่ม KTC", name:"แถมจากบัตรเครดิต", type:"อุบัติเหตุ", source:"แถมจากบัตร", premium:0,
    items:[["ค่ารักษาจากอุบัติเหตุ","20,000 บ./ครั้ง"],["เสียชีวิตจากอุบัติเหตุ","500,000 บ."]] },
];

const COVERAGE = [
  { key:"life", icon:"☂️", name:"ชีวิต", sub:"เสียชีวิตจากอุบัติเหตุ", current:1500000, target:1500000, status:"duplicate",
    from:["เมืองไทย PA Plus · 1,000,000","ประกันกลุ่ม KTC · 500,000"],
    note:"รวมจาก 2 ฉบับที่ซ้อนกัน — แต่ระวัง: ยังไม่มีคุ้มครองการเสียชีวิตจากการเจ็บป่วย (ทั้งคู่คุ้มครองเฉพาะอุบัติเหตุ)" },
  { key:"ci", icon:"🎗️", name:"โรคร้ายแรง", sub:"เงินก้อนเมื่อตรวจพบ", current:0, target:1000000, status:"gap", from:[],
    note:"ไม่มีฉบับใดคุ้มครอง — ช่องโหว่ใหญ่ที่สุดของพอร์ต: IPD ช่วยค่ารักษา แต่ไม่ชดเชยรายได้ที่หายไประหว่างป่วย" },
  { key:"ipd", icon:"🏥", name:"ผู้ป่วยใน (IPD)", sub:"ค่ารักษา + ผ่าตัด/ครั้ง", current:210000, target:250000, status:"ok",
    from:["AIA Health Happy · ผ่าตัด 150,000 + IPD 60,000"], note:"ครอบคลุมการรักษาในโรงพยาบาลเอกชนทั่วไปได้ดี" },
  { key:"accident", icon:"🩹", name:"อุบัติเหตุ", sub:"ค่ารักษา/ครั้ง", current:50000, target:90000, status:"duplicate",
    from:["เมืองไทย PA Plus · 30,000","ประกันกลุ่ม KTC · 20,000"],
    note:"2 ฉบับซ้อนกัน — เบิกไล่ลำดับตามค่าใช้จ่ายจริง (ไม่ใช่ได้ 2 เด้ง) แต่ฉบับ KTC ฟรี จึงไม่เสียเบี้ยซ้ำ" },
  { key:"room", icon:"🛏️", name:"ค่าห้อง", sub:"ต่อคืน", current:4000, target:8000, status:"low",
    from:["AIA Health Happy · 4,000/คืน สูงสุด 90 คืน"],
    note:"พอสำหรับ รพ.รัฐ/เอกชนขนาดกลาง แต่ต่ำกว่าค่าห้องเฉลี่ยโรงพยาบาลเอกชนใหญ่ใน กทม. — ส่วนต่างต้องจ่ายเอง" },
  { key:"opd", icon:"💊", name:"ผู้ป่วยนอก (OPD)", sub:"เจ็บป่วยทั่วไป", current:0, target:30000, status:"gap", from:[],
    note:"เป็นไข้ ไปหาหมอแบบไม่นอนโรงพยาบาล เบิกไม่ได้เลยทั้ง 3 ฉบับ (PA คุ้มครองเฉพาะอุบัติเหตุ)" },
];
const pctOf = c => Math.round(Math.min(c.current / c.target, 1) * 100);

const QUICK = [
  "ขับมอเตอร์ไซค์ล้ม ค่ารักษา 8,000 บาท เบิกฉบับไหนก่อน?",
  "รายได้สุทธิ 800,000 มีประกันชีวิต 40,000 เหลือสิทธิ์ลดหย่อนภาษีอีกเท่าไหร่?",
  "อายุ 35 อยากเกษียณตอน 60 มีเงินออม 500,000 ออมปีละ 60,000 พอไหม?",
  "อยากเก็บค่าเรียนลูก 2 ล้านใน 12 ปี ต้องออมเดือนละเท่าไหร่?",
];
const DISCLAIMER = "⚠️ คำตอบนี้เป็นการประเมินจากข้อมูลกรมธรรม์ที่วิเคราะห์ไว้ ไม่ใช่การยืนยันสิทธิ์อย่างเป็นทางการจากบริษัทประกัน";
const AI_STEPS = ["อ่านเอกสารทุกไฟล์ (OCR)","สกัดความคุ้มครองรายบรรทัด","เทียบทั้งพอร์ต — หาซ้ำซ้อนและช่องโหว่"];
const DEMO_FILES = ["AIA_HealthHappy_กรมธรรม์.pdf","LINE_พ่อส่งมา_เมืองไทยPA.jpg","KTC_ประกันกลุ่ม_อีเมล.pdf"];

// ---------- helpers ----------
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const el = id => document.getElementById(id);
const badgeStyle = st => ({
  duplicate:{bg:"var(--amberBg)",color:"var(--amber)",label:"ซ้ำซ้อน"},
  gap:{bg:"var(--redBg)",color:"var(--red)",label:"ยังขาด"},
  low:{bg:"var(--amberBg)",color:"var(--amber)",label:"ยังไม่พอ"},
  ok:{bg:"var(--mint)",color:"var(--teal)",label:"ครบแล้ว"},
}[st]);

// ============================================================
// Render
// ============================================================
function render(){
  const app = el("app");
  if(state.screen==="login"){ app.innerHTML = loginHTML(); bindLogin(); return; }
  app.innerHTML = navHTML() +
    (state.screen==="upload" ? uploadHTML()
     : state.screen==="dashboard" ? dashboardHTML()
     : chatHTML());
  bindNav();
  if(state.screen==="upload") bindUpload();
  if(state.screen==="dashboard") bindDashboard();
  if(state.screen==="chat") bindChat();
}

// ---------- Login ----------
function loginHTML(){
  return `<div class="login">
    <div class="login-left">
      <div class="brand">PolicySense</div>
      <div>
        <div style="font-size:34px;font-weight:600;line-height:1.35">หยุดรื้อเอกสาร<br>แล้วมา<span style="color:var(--tealSoft)">ตัดสินใจ</span>แทน</div>
        <p style="margin-top:20px;max-width:26rem;color:#9FBDB4;line-height:1.7">อัปโหลดกรมธรรม์ทุกฉบับครั้งเดียว — AI สรุปพอร์ต บอกว่าอะไรซ้ำ อะไรขาด และเคสตรงหน้าเบิกได้ไหม โดยไม่ต้องเปิดอ่านสักหน้า</p>
        <div style="margin-top:24px;display:flex;gap:8px;flex-wrap:wrap">
          <span class="pill">Fewer steps</span><span class="pill">Owner flips</span><span class="pill">Outcome feeds back</span>
        </div>
      </div>
      <p style="font-size:12px;color:#6E8B84">เป็นกลาง ไม่ขายประกัน ไม่มีค่าคอมมิชชั่น</p>
    </div>
    <div class="login-right">
      <div style="width:100%;max-width:22rem">
        <h1>เข้าสู่ระบบ</h1>
        <p class="muted" style="font-size:14px;margin:4px 0 24px">โหมดสาธิต — กดเข้าสู่ระบบได้เลย ไม่ต้องแก้อะไร</p>
        <label class="field"><span>อีเมล</span><input id="in-email" value="demo@policysense.app"></label>
        <label class="field"><span>รหัสผ่าน</span><input id="in-pass" type="password" value="demo1234"></label>
        <button class="btn-primary" id="btn-login">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>`;
}
function bindLogin(){
  el("btn-login").onclick = () => {
    state.user = { email: el("in-email").value || "demo@policysense.app" };
    state.screen = "upload"; render();
  };
}

// ---------- Nav ----------
function navHTML(){
  const pend = state.decisions.filter(d=>d.outcome==="pending").length;
  const tab = (key,label,enabled,badge) =>
    `<button class="tab ${state.screen===key?'active':''}" data-tab="${key}" ${enabled?'':'disabled'}>${label}${badge?`<span class="badge">${badge}</span>`:''}</button>`;
  return `<header class="nav"><div class="nav-inner">
    <span class="brand">PolicySense</span>
    <nav class="tabs">
      ${tab("upload","1 · อัปโหลด",true,0)}
      ${tab("dashboard","2 · แดชบอร์ดพอร์ต",state.analyzed, state.screen!=="dashboard"?pend:0)}
      ${tab("chat","3 · ถามผู้ช่วย AI",state.analyzed,0)}
    </nav>
    <span class="email">${esc(state.user?.email||"")}</span>
  </div></header>`;
}
function bindNav(){
  document.querySelectorAll("[data-tab]").forEach(b=>{
    if(b.disabled) return;
    b.onclick = () => { state.screen = b.dataset.tab; render(); };
  });
}

// ---------- Upload ----------
function uploadHTML(){
  let body;
  if(state.uploadPhase==="idle"){
    body = `
      <div class="drop" id="drop">
        <p style="font-weight:500">ลากไฟล์มาวาง หรือคลิกเพื่อเลือก</p>
        <p class="muted" style="font-size:14px;margin:4px 0 0">รองรับ PDF, JPG, PNG · หลายไฟล์พร้อมกัน</p>
        <input id="file-input" type="file" multiple accept="application/pdf,image/*" class="hidden">
      </div>
      <button id="btn-demo" style="margin-top:12px;font-size:14px;color:var(--teal);text-decoration:underline">หรือใช้ไฟล์ตัวอย่าง 3 ฉบับ (โหมดสาธิต)</button>
      <div id="filelist">${state.files.map((f,i)=>`<div class="filerow"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f)}</span><button data-rm="${i}" style="font-size:12px;color:var(--sub)">ลบ</button></div>`).join("")}</div>
      <button class="btn-primary" id="btn-analyze" style="margin-top:32px;padding:16px;font-size:17px" ${state.files.length?'':'disabled'}>ให้ AI วิเคราะห์ทั้งพอร์ต →</button>`;
  } else {
    body = `<div class="card" style="margin-top:32px;padding:24px">
      ${AI_STEPS.map((label,i)=>{
        const done = i<state.uploadStep || state.uploadPhase==="done";
        const active = i===state.uploadStep && state.uploadPhase==="running";
        return `<div class="step ${done?'done':active?'active':''}"><span class="dot">${done?'✓':i+1}</span><span style="color:${done||active?'var(--deep)':'var(--faint)'}">${label}</span>${active?'<span style="font-size:12px;color:var(--teal)">กำลังทำงาน…</span>':''}</div>`;
      }).join("")}
      ${state.uploadPhase==="done"?'<p style="margin-top:12px;font-size:14px;font-weight:500;color:var(--teal)">วิเคราะห์ 3 ฉบับเสร็จแล้ว — กำลังพาไปหน้าสรุปพอร์ต…</p>':''}
    </div>`;
  }
  return `<div class="wrap" style="padding-top:40px;padding-bottom:40px;max-width:680px">
    <p style="font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal)">ขั้นตอนเดียวที่คุณต้องทำ</p>
    <h1 style="font-size:30px;margin-top:4px">อัปโหลดกรมธรรม์ทุกฉบับที่มี</h1>
    <p class="muted" style="margin-top:8px;line-height:1.7">PDF จากอีเมล หรือรูปที่เซฟจาก LINE ก็ได้ — เมื่อกดปุ่มเดียว AI จะทำงานที่คุณเคยต้องทำเอง 3 อย่างแทนทั้งหมด</p>
    ${body}
  </div>`;
}
function bindUpload(){
  if(state.uploadPhase!=="idle") return;
  const drop = el("drop"), input = el("file-input");
  drop.onclick = () => input.click();
  drop.ondragover = e => { e.preventDefault(); drop.classList.add("over"); };
  drop.ondragleave = () => drop.classList.remove("over");
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove("over"); addFiles([...e.dataTransfer.files].map(f=>f.name)); };
  input.onchange = e => addFiles([...e.target.files].map(f=>f.name));
  el("btn-demo").onclick = () => { state.files = [...DEMO_FILES]; render(); };
  document.querySelectorAll("[data-rm]").forEach(b=> b.onclick = () => { state.files.splice(+b.dataset.rm,1); render(); });
  const analyze = el("btn-analyze");
  if(analyze) analyze.onclick = runAnalyze;
}
function addFiles(names){ state.files.push(...names); render(); }
function runAnalyze(){
  state.uploadPhase = "running"; state.uploadStep = 0; render();
  const t = setInterval(()=>{
    state.uploadStep++;
    if(state.uploadStep >= AI_STEPS.length){
      clearInterval(t);
      state.uploadPhase = "done"; render();
      setTimeout(()=>{ state.analyzed = true; state.screen = "dashboard"; state.uploadPhase="idle"; render(); }, 900);
    } else render();
  }, 1400);
}

// ---------- Dashboard ----------
function ring(pct){
  const size=88, stroke=9, r=(size-stroke)/2, circ=2*Math.PI*r;
  const color = pct===0 ? "#D9E2DF" : pct>=80 ? "var(--teal)" : "#EF9F27";
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E7EEEB" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${pct/100*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="600" fill="var(--deep)">${pct}%</text></svg>`;
}

const OUTCOMES = [["approved","เคลมผ่านเต็มจำนวน"],["partially","ผ่านบางส่วน"],["rejected","ถูกปฏิเสธ"],["purchased","ซื้อแล้ว"]];
const decTypeLabel = t => ({claim:"ยื่นเคลม",buy_more:"ซื้อเพิ่ม",no_action:"ยังไม่ทำ"}[t]);
function decisionRowHTML(d){
  return `<div class="card" style="padding:16px;margin-bottom:12px">
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px">
      <div><p style="font-weight:500;margin:0">${decTypeLabel(d.decision_type)} <span class="muted" style="font-weight:400;font-size:14px">— ${esc(d.context)}</span></p>
      ${d.outcome!=="pending"?`<p style="font-size:14px;margin:4px 0 0;color:var(--teal)">✓ ผลลัพธ์: ${OUTCOMES.find(o=>o[0]===d.outcome)[1]} — ป้อนกลับเข้า AI แล้ว</p>`:""}</div>
      ${d.outcome==="pending"?`<div style="display:flex;flex-wrap:wrap;gap:6px">${OUTCOMES.map(o=>`<button class="chip" data-out="${d.id}" data-val="${o[0]}">${o[1]}</button>`).join("")}</div>`:""}
    </div>
  </div>`;
}
function bindDashboard(){
  document.querySelectorAll("[data-cov]").forEach(b=> b.onclick = () => { state._open = state._open===b.dataset.cov?null:b.dataset.cov; render(); });
  document.querySelectorAll("[data-dec]").forEach(b=> b.onclick = () => { addDecision(b.dataset.dec, b.dataset.dec==="claim"?"ยื่นเคลมจากหน้าพอร์ต":"ซื้อเพิ่มปิดช่องโหว่ โรคร้ายแรง/OPD"); render(); });
  document.querySelectorAll("[data-goto]").forEach(b=> b.onclick = () => { state.screen = b.dataset.goto; render(); });
  document.querySelectorAll("[data-out]").forEach(b=> b.onclick = () => { recordOutcome(+b.dataset.out, b.dataset.val); render(); });
}
function addDecision(type, ctx){ state.decisions.push({id:Date.now()+Math.random(), decision_type:type, context:ctx, outcome:"pending", outcome_detail:null}); }
function recordOutcome(id, outcome){ const d=state.decisions.find(x=>x.id===id); if(d) d.outcome=outcome; }

// ---------- Chat ----------
function chatHTML(){
  const learned = state.decisions.some(d=>d.outcome!=="pending");
  const msgs = state.chat.map(m=>`<div class="msg ${m.role==='user'?'user':''}"><div class="bub ${m.role==='user'?'user':'ai'}">${esc(m.content)}</div></div>`).join("");
  const empty = state.chat.length===0 ? `<div class="card" style="padding:20px">
      <p style="font-size:14px;font-weight:500;margin:0 0 12px">ลองถามคำถามที่คนมีประกันหลายฉบับเจอบ่อย:</p>
      ${QUICK.map(q=>`<button class="qbtn" data-q="${esc(q)}">${esc(q)}</button>`).join("")}
    </div>` : "";
  const loading = state.chatLoading ? `<div class="msg"><div class="bub ai" style="color:var(--sub)">กำลังไล่อ่านเงื่อนไขทั้ง 3 ฉบับ…</div></div>` : "";
  const decideBar = (state.chat.length>0 && !state.chatLoading) ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">
      <button class="chip" data-cdec="claim" style="border-color:var(--tealSoft);color:var(--teal)">✓ ตัดสินใจยื่นเคลม</button>
      <button class="chip" data-cdec="buy_more" style="border-color:var(--tealSoft);color:var(--teal)">✓ ตัดสินใจซื้อเพิ่ม</button>
      <button class="chip" data-cdec="no_action">ยังไม่ทำตอนนี้</button>
    </div>` : "";
  return `<div class="wrap" style="padding-top:24px;padding-bottom:24px;max-width:760px;display:flex;flex-direction:column;min-height:calc(100vh - 57px)">
    <div>
      <h1 style="font-size:20px">ผู้ช่วยประกัน + วางแผนการเงิน</h1>
      <p class="muted" style="font-size:14px;margin:2px 0 0">รู้ทุกบรรทัดของทั้ง 3 ฉบับ · ตอบเรื่องเคลม ภาษี เกษียณ และการออมเพื่อลูก${learned?" · กำลังใช้ผลลัพธ์จริงจากการตัดสินใจก่อนหน้าประกอบคำแนะนำ ↻":""}</p>
    </div>
    <div style="flex:1;margin-top:16px">${empty}${msgs}${loading}</div>
    ${decideBar}
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="chat-input" placeholder="เช่น ปวดท้องต้องผ่าไส้ติ่ง เบิกได้เท่าไหร่?" style="flex:1;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:14px">
      <button id="chat-send" class="btn-primary" style="width:auto;padding:12px 20px" ${state.chatLoading?'disabled':''}>ถาม</button>
    </div>
  </div>`;
}
function bindChat(){
  document.querySelectorAll("[data-q]").forEach(b=> b.onclick = () => send(b.dataset.q));
  document.querySelectorAll("[data-cdec]").forEach(b=> b.onclick = () => {
    const t=b.dataset.cdec, last=state.chat[state.chat.length-2]?.content||"";
    addDecision(t, t==="claim"?`ตัดสินใจยื่นเคลมหลังคุยกับ AI: "${last.slice(0,50)}…"`:t==="buy_more"?"ตัดสินใจซื้อเพิ่มหลังคุยกับ AI":"รับทราบข้อมูล ยังไม่ดำเนินการ");
    b.textContent = "บันทึกแล้ว ↻ ไปกรอกผลจริงได้ที่แดชบอร์ด"; b.style.background="var(--mint)"; b.style.color="var(--teal)"; b.disabled=true;
  });
  const input = el("chat-input"), sendBtn = el("chat-send");
  if(input) input.onkeydown = e => { if(e.key==="Enter") send(input.value); };
  if(sendBtn) sendBtn.onclick = () => send(input.value);
}
function buildSystem(){
  const past = state.decisions.map(d=>({การตัดสินใจ:d.decision_type,บริบท:d.context,ผลจริง:d.outcome}));
  return `คุณคือผู้ช่วยที่เป็นทั้งผู้เชี่ยวชาญด้านประกันและนักวางแผนการเงินส่วนบุคคลที่เป็นกลาง (ไม่ขายประกัน ไม่มีค่าคอมมิชชั่น) ตอบเป็นภาษาไทย กระชับ ไม่เกิน 6-8 ประโยค
ตอบจากข้อมูลกรมธรรม์ของผู้ใช้ด้านล่างเท่านั้น ห้ามเดาเงื่อนไขที่ไม่ปรากฏ
เมื่อถูกถามว่าเบิกได้ไหม ให้ระบุ: กรมธรรม์ที่เกี่ยวข้อง, วงเงินโดยประมาณ, ลำดับการเคลมก่อน-หลัง, เงื่อนไขที่ควรเช็ก
เมื่อถูกถามเรื่องภาษี/เกษียณ/ออมเพื่อลูก: คำนวณเป็นขั้นตอน แสดงตัวเลขและสมมติฐาน (เพดานลดหย่อนประกันชีวิต 100,000 สุขภาพ 25,000 บำนาญ 200,000 บ. เป็นค่าอ้างอิง ให้ผู้ใช้ตรวจสอบกับกรมสรรพากร)
ถ้าข้อมูลไม่พอให้ถามก่อน อย่าสมมติเอง
ปิดท้ายทุกคำตอบด้วย: "${DISCLAIMER}"

## กรมธรรม์ของผู้ใช้
${JSON.stringify(POLICIES)}
## ผลตรวจพอร์ตรายหมวด
${JSON.stringify(COVERAGE.map(c=>({หมวด:c.name,สถานะ:c.status,มี:c.current,เป้าหมาย:c.target,หมายเหตุ:c.note})))}
## ประวัติการตัดสินใจ+ผลจริง
${past.length?JSON.stringify(past):"ยังไม่มี"}`;
}
async function send(q){
  q = (q||"").trim();
  if(!q || state.chatLoading) return;
  state.chat.push({role:"user",content:q});
  state.chatLoading = true; render();
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system:buildSystem(),
        messages: state.chat.map(m=>({role:m.role,content:m.content})) }),
    });
    if(!res.ok) throw new Error("api");
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    if(!text) throw new Error("empty");
    state.chat.push({role:"assistant",content:text});
  }catch(e){
    await new Promise(r=>setTimeout(r,500));
    state.chat.push({role:"assistant",content:mockAnswer(q)});
  }finally{
    state.chatLoading = false; render();
  }
}
// คำตอบจำลองเมื่อเปิดนอก claude.ai (API เรียกไม่ได้) — ไม่เสียโทเคน
function mockAnswer(q){
  const learned = state.decisions.some(d=>d.outcome!=="pending") ? "\n\n(↻ คำแนะนำนี้ปรับตามผลลัพธ์จริงที่คุณเคยบันทึกไว้ด้วย)" : "";
  const has = (...kw)=>kw.some(k=>q.includes(k));
  let body;
  if(has("มอเตอร์ไซค์","อุบัติเหตุ","ล้ม","รถ")){
    body="กรณีบาดเจ็บจากอุบัติเหตุ เบิกได้จาก 2 ฉบับ:\n1. เริ่มที่ เมืองไทย PA Plus (30,000 บ./ครั้ง) เป็นฉบับหลัก\n2. ถ้าเกินวงเงิน ใช้ประกันกลุ่ม KTC (20,000 บ./ครั้ง) สำรอง\nค่ารักษา 8,000 บาทอยู่ในวงเงินฉบับแรกสบาย ๆ เบิกฉบับเดียวพอ (เบิกซ้อนคิดตามค่าใช้จ่ายจริง ไม่ใช่ได้สองเด้ง)";
  } else if(has("ลดหย่อน","ภาษี","สรรพากร")){
    body="🔧 เรียกเครื่องมือ Tax_Calculator (คำนวณจริง):\nรายได้สุทธิ 800,000 บ. ภาษีปัจจุบัน ~75,000 บ.\nสิทธิ์ลดหย่อนที่เหลือ: ประกันชีวิต 60,000 · สุขภาพ 25,000 · บำนาญ 200,000 บ.\nหากใช้เต็ม ประหยัดภาษีเพิ่มได้ ~45,250 บ./ปี\nแนะนำ: ประกันบำนาญให้ผลลดหย่อนสูงสุดและช่วยวางแผนเกษียณไปในตัว";
  } else if(has("เกษียณ","เกษียน","ออม")){
    body="🔧 เรียกเครื่องมือ Retirement_Projector (ทบต้น 3%/ปี):\nอายุ 35→60 (25 ปี) ทุน 500,000 + ออมปีละ 60,000\n• เงินก้อนตอนเกษียณ ~3,234,000 บ.\n• กระแสเงินต่อปี (ถอน 4%) ~129,000 บ.\nถ้าเป้าหมาย 300,000/ปี → ยังขาดปีละ ~170,000 บ. ควรเพิ่มเงินสมทบหรือประกันบำนาญ";
  } else if(has("ค่าเรียน","ค่าเล่าเรียน","ลูก","การศึกษา")){
    body="🔧 เรียกเครื่องมือ Education_Planner:\nเป้าหมาย 2,000,000 บ. ใน 12 ปี (ผลตอบแทน 3%/ปี)\n• ต้องออม ~10,900 บ./เดือน (131,000 บ./ปี)\n• ระยะยาว อาจพิจารณา Unit-Linked เพื่อโอกาสผลตอบแทนสูงขึ้น (มีความเสี่ยง)";
  } else if(has("ซื้อ","เพิ่ม","แนะนำ","สะสมทรัพย์","ตัวไหน")){
    body="ช่องโหว่ที่ควรอุดก่อน เรียงตามความเร่งด่วน:\n1. โรคร้ายแรง (CI) — ตอนนี้ 0% ไม่มีเลย ควรมองแผนจ่ายเงินก้อนเมื่อตรวจพบ\n2. OPD — ถ้าไปหาหมอเกิน 4-5 ครั้ง/ปี การมี OPD rider จะคุ้ม\nอุบัติเหตุ/ชีวิตซ้ำซ้อนอยู่แล้ว ไม่ต้องซื้อเพิ่ม";
  } else {
    body="จากกรมธรรม์ 3 ฉบับ: IPD ครอบคลุมดี, อุบัติเหตุและชีวิตซ้ำซ้อน 2 ฉบับ, ยังขาดโรคร้ายแรงและ OPD อยากเจาะลึกหมวดไหน ลองถามเจาะจง เช่น 'เจ็บป่วยแบบนี้เบิกได้เท่าไหร่'";
  }
  return body + learned + "\n\n" + DISCLAIMER;
}
